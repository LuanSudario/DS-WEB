<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Prática de Validação JS</title>
    <script defer src="script.js"></script>
</head>
<style>
    .pai{
        color: red;
    }
</style>

<body>
    <h1>Formulário de Cadastro</h1>
    <p>Preencha todos os campos e clique em Enviar.</p>
    <form id="form">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva" class="Jesus" oninput="Namevalidate()">
        <span id="erro-nome" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" placeholder="Ex: maria@email.com" class="Jesus" oninput="Emailvalidate()">
        <span id="erro-email" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" class="Jesus"  oninput="Passwordvalidate()"">
        
                                          <br>
        <label for="confirma-senha">Confirmar senha:</label>
        <input type="password" id="confirma-senha" name="confirma-senha" placeholder="Repita a senha" class="Jesus" oninput="Passwordvalidateiso()">
        <span id="erro-senha" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" maxlength="14" class="Jesus" oninput="CPFvalidate()">
        <span id="erro-cpf" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15" class="Jesus" oninput="Telvalidate()">
        <span id="erro-telefone" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="Ex: 01310-100" maxlength="9" class="Jesus" oninput="CEPvalidate()">
        <span id="erro-cep" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="data-nascimento">Data:</label>
        <input type="text" id="data-nascimento" name="data-nascimento" placeholder="Ex: 31/12/1990" maxlength="10" class="Jesus" oninput="Datevalidate()">
        <span id="erro-data-nascimento" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="valor">Valor:</label>
        <input type="text" id="valor" name="valor" placeholder="Ex: 1.299,90" class="Jesus" oninput="Dinerovalidate()">
        <span id="erro-valor" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="Ex: https://meusite.com.br" class="Jesus" oninput="URLvalidate()">
        <span id="erro-url" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <label for="cartao">Número do cartão:</label>
        <input type="text" id="cartao" name="cartao" placeholder="Ex: 4111 1111 1111 1111" maxlength="19" class="Jesus" oninput="Cardvalidate()">
        <span id="erro-cartao" class="pai"></span>
        
                                          <br>
        
                                          <br>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
    <hr>
    <div id="resultado"></div>
</body>

</html>
