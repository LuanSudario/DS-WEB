<!DOCTYPE html>
<html>

<head>
    <title>Exercício 1 - Formulário de Cadastro Simples</title>


</head>

<body>
    <h1 align="center">Exercício 1 - Formulário de Cadastro Simples</h1>
    <form action="Pasta de tarefas do Bruno sla.php" method="get" align="center" id="form">
        <label for="Nome">Nome:</label>
        <input type="text" id="Nome" class="required" name="Nome" maxlength="50" placeholder="Insira o seu nome" oninput="nameValidate()"><br>
        <label for="E-mail">E-mail:</label>
        <input type="email" id="E-mail" name="E-mail" class="required" placeholder="Insira seu email" oninput="emailValidate()"> <br>
        <label for="Senha">Senha:</label>
        <input type="password" name="Senha" id="Senha" class="required" placeholder="Insira sua senha"> <br>
        <label for="Idade">Idade:</label>
        <input type="number" name="Idade" id="Idade" min="1" max="120"class="required" placeholder="Insira sua idade"> <br>
        <input type="submit" value="Enviar">
    </form>

</body>
<script src="Valida-form.js"></script>

</html>
